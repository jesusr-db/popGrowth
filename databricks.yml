bundle:
  name: popGrowth

workspace:
  host: https://fe-vm-vdm-classic-rikfy0.cloud.databricks.com
  profile: DEFAULT

variables:
  catalog:
    default: store_siting
    description: "Unity Catalog name"
  warehouse_id:
    default: "5067b513037fbf07"
    description: "SQL Warehouse ID for app queries"
  lakebase_host:
    default: "instance-59db99f9-a205-4462-a1ed-60148c679c9d.database.cloud.databricks.com"
    description: "Lakebase PostgreSQL endpoint host"
  lakebase_database:
    default: "store_siting_app"
    description: "Lakebase PostgreSQL database name"

include:
  - resources/*.yml
  - resources/jobs/*.yml

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: store_siting_dev
      lakebase_database: store_siting_app_dev

  prod:
    variables:
      catalog: store_siting
      lakebase_database: store_siting_app
