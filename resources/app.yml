resources:
  apps:
    store_siting_app:
      name: "store-siting"
      description: "QSR Store Siting — Growth Score Explorer"
      source_code_path: ../src/app
      resources:
        - name: "lakebase"
          database:
            instance_name: "store-siting-app"
            database_name: "store_siting_app"
            permission: "CAN_CONNECT_AND_CREATE"
      config:
        command:
          - python
          - app.py
        env:
          - name: LAKEBASE_INSTANCE
            value: "store-siting-app"
          - name: CATALOG
            value: ${var.catalog}
