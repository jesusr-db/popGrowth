resources:
  jobs:
    ingest_school_enrollment:
      name: "popgrowth-ingest-school-enrollment"
      schedule:
        quartz_cron_expression: "0 0 6 15 9 ?"
        timezone_id: "America/New_York"
      tasks:
        - task_key: ingest
          environment_key: default
          spark_python_task:
            python_file: ../../src/jobs/ingest_school_enrollment.py
            source: WORKSPACE
      environments:
        - environment_key: default
          spec:
            client: "1"
