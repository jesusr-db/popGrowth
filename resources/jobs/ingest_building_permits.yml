resources:
  jobs:
    ingest_building_permits:
      name: "store-siting-ingest-building-permits"
      schedule:
        quartz_cron_expression: "0 0 6 1 * ?"
        timezone_id: "America/New_York"
      tasks:
        - task_key: ingest
          spark_python_task:
            python_file: src/jobs/ingest_building_permits.py
            source: WORKSPACE
          existing_cluster_id: ${var.cluster_id}
