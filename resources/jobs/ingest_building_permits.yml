resources:
  jobs:
    ingest_building_permits:
      name: "store-siting-ingest-building-permits"
      schedule:
        quartz_cron_expression: "0 0 6 1 * ?"
        timezone_id: "America/New_York"
      job_clusters:
        - job_cluster_key: main
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"
              spark.databricks.cluster.profile: singleNode
            custom_tags:
              ResourceClass: SingleNode
      tasks:
        - task_key: ingest
          job_cluster_key: main
          spark_python_task:
            python_file: ../../src/jobs/ingest_building_permits.py
            source: WORKSPACE
