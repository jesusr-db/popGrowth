resources:
  jobs:
    transform_silver:
      name: "popgrowth-transform-silver"
      tasks:
        - task_key: run_silver_transforms
          environment_key: default
          spark_python_task:
            python_file: ../../src/jobs/transform_silver.py
            source: WORKSPACE
      environments:
        - environment_key: default
          spec:
            client: "1"
