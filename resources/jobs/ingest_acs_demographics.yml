resources:
  jobs:
    ingest_acs_demographics:
      name: "store-siting-ingest-acs-demographics"
      schedule:
        quartz_cron_expression: "0 0 6 15 9 ?"
        timezone_id: "America/New_York"
      tasks:
        - task_key: ingest
          python_wheel_task:
            package_name: store_siting
            entry_point: ingest_acs_demographics
          libraries:
            - whl: ../dist/*.whl
          existing_cluster_id: ${var.cluster_id}
