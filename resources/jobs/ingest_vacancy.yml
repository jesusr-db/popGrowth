resources:
  jobs:
    ingest_vacancy:
      name: "store-siting-ingest-vacancy"
      schedule:
        quartz_cron_expression: "0 0 6 1 1,4,7,10 ?"
        timezone_id: "America/New_York"
      tasks:
        - task_key: ingest
          python_wheel_task:
            package_name: store_siting
            entry_point: ingest_vacancy
          libraries:
            - whl: ../dist/*.whl
          existing_cluster_id: ${var.cluster_id}
