resources:
  jobs:
    ingest_ssp_projections:
      name: "store-siting-ingest-ssp-projections"
      schedule:
        quartz_cron_expression: "0 0 6 1 1 ?"
        timezone_id: "America/New_York"
      tasks:
        - task_key: ingest
          spark_python_task:
            python_file: src/jobs/ingest_ssp_projections.py
            source: WORKSPACE
          existing_cluster_id: ${var.cluster_id}
