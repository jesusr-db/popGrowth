resources:
  jobs:
    ingest_business_patterns:
      name: "store-siting-ingest-business-patterns"
      schedule:
        quartz_cron_expression: "0 0 6 15 6 ?"
        timezone_id: "America/New_York"
      tasks:
        - task_key: ingest
          spark_python_task:
            python_file: src/jobs/ingest_business_patterns.py
            source: WORKSPACE
          existing_cluster_id: ${var.cluster_id}
