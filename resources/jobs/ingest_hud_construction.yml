resources:
  jobs:
    ingest_hud_construction:
      name: "store-siting-ingest-hud-construction"
      schedule:
        quartz_cron_expression: "0 0 6 1 1,4,7,10 ?"
        timezone_id: "America/New_York"
      tasks:
        - task_key: ingest
          spark_python_task:
            python_file: src/jobs/ingest_hud_construction.py
            source: WORKSPACE
          existing_cluster_id: ${var.cluster_id}
