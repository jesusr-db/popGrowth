resources:
  jobs:
    ingest_national_projections:
      name: "store-siting-ingest-national-projections"
      schedule:
        quartz_cron_expression: "0 0 6 1 1 ?"
        timezone_id: "America/New_York"
      tasks:
        - task_key: ingest
          environment_key: default
          spark_python_task:
            python_file: ../../src/jobs/ingest_national_projections.py
            source: WORKSPACE
      environments:
        - environment_key: default
          spec:
            client: "1"
